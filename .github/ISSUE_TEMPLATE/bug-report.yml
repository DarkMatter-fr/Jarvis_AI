name: "🐞 Beta Bug Report"
description: Report a bug to help improve the Jarvis Assistant.
title: "[BUG]: "
labels: ["beta", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping test Jarvis! Please provide as much detail as possible so we can squash this bug.

  - type: input
    id: version
    attributes:
      label: Python Version
      description: What version of Python are you using? (e.g., 3.12, 3.14)
      placeholder: e.g., 3.13
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Which module failed?
      description: Select the part of Jarvis that isn't working correctly.
      options:
        - Brain (AI/Gemini)
        - Ears (Mic/Listening)
        - Mouth (Voice/Speaking)
        - Automation (Chrome/Search)
        - UI (Eel/Visuals)
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us exactly what went wrong.
      placeholder: e.g., Jarvis listened to my command but didn't respond.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we make this bug happen again?
      placeholder: |
        1. Run main.py
        2. Click the orb
        3. Say 'search for coffee'
        4. Observe the crash
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have added my own API key to config.py.
          required: true
        - label: I have installed all libraries via requirements.txt.
          required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs (if any)
      description: Copy and paste the error from your terminal here.
      render: shell