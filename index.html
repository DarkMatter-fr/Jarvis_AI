<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEN // ASSISTANT v1.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #0A0A0F;
            --bg-navy: #0D0D1A;
            --accent-crimson: #E84057;
            --accent-violet: #6B21A8;
            --text-main: #E8E6F0;
            --text-muted: #6B6880;
            --hud-cyan: #22D3EE;
            --font-ui: 'Rajdhani', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-void);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Atmosphere */
        body::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; opacity: 0.03; pointer-events: none; z-index: 10;
        }

        .noise-bg {
            position: absolute; inset: 0;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiIHZpZXdCb3g9IjAgMCA0IDQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wNSIvPjwvc3ZnPg==');
            opacity: 0.1; pointer-events: none; z-index: 1;
        }

        .fog-bg {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(107, 33, 168, 0.15) 0%, rgba(10, 10, 15, 0) 70%);
            pointer-events: none; z-index: 2;
        }

        .gradient-bg {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, var(--bg-navy) 0%, var(--bg-void) 100%);
            z-index: 0;
        }

        .view-container {
            position: relative; z-index: 5; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding-bottom: 50px;
        }

        /* Header */
        .header { width: 100%; padding: 20px 40px; text-align: center; border-bottom: 1px solid rgba(232, 64, 87, 0.1); }
        .header h1 { font-size: 24px; font-weight: 700; color: var(--accent-crimson); letter-spacing: 0.3em; text-transform: uppercase; }
        .header p { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        /* Orb & States */
        .center-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; gap: 20px; }
        .orb-wrapper { position: relative; width: 120px; height: 120px; cursor: pointer; outline: none; }
        .orb-ring { position: absolute; inset: -2px; border-radius: 50%; border: 2px solid var(--accent-crimson); opacity: 0; pointer-events: none; }
        
        .orb {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #2A0A14 0%, var(--bg-void) 100%);
            border: 2px solid rgba(232, 64, 87, 0.4);
            display: flex; justify-content: center; align-items: center;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .orb svg { width: 48px; height: 48px; fill: var(--accent-crimson); }

        .orb-wrapper.listening .orb { border-color: var(--accent-crimson); box-shadow: 0 0 25px var(--accent-crimson); transition: none !important; }
        .orb-wrapper.listening .orb-ring { animation: orbPulse 1.2s infinite; }

        .orb-wrapper.thinking .orb { border-color: var(--accent-violet); box-shadow: 0 0 25px var(--accent-violet); }
        .orb-wrapper.thinking::before {
            content: ''; position: absolute; inset: -4px; border-radius: 50%; padding: 4px;
            background: conic-gradient(from 0deg, var(--bg-void), var(--accent-violet), var(--bg-void));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; animation: orbThink 2s linear infinite; z-index: 0;
        }

        .orb-wrapper.speaking .orb { border-color: var(--accent-violet); animation: orbSpeak 0.4s infinite; }

        /* Waveform */
        .waveform-container { width: 100%; height: 80px; display: flex; justify-content: center; }
        #waveform { width: 100%; max-width: 800px; height: 100%; }

        /* Transcript */
        .transcript-wrapper { width: 100%; max-width: 800px; padding: 0 20px; margin-bottom: 20px; }
        .transcript-panel {
            background: rgba(13, 13, 26, 0.8); border: 1px solid rgba(232, 64, 87, 0.15);
            border-radius: 8px; padding: 16px; max-height: 280px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px; font-family: var(--font-mono); font-size: 13px;
        }

        .msg { max-width: 85%; padding: 10px 14px; border-radius: 4px; animation: fadeIn 0.4s ease forwards; line-height: 1.5; position: relative; }
        .msg .time { font-size: 10px; color: var(--text-muted); margin-top: 6px; display: block; }
        .msg.user { align-self: flex-end; background: rgba(232, 64, 87, 0.08); border-left: 2px solid var(--accent-crimson); }
        .msg.assistant { align-self: flex-start; background: rgba(107, 33, 168, 0.1); border-left: 2px solid var(--accent-violet); }

        /* HUD */
        .hud {
            position: absolute; bottom: 0; width: 100%; height: 50px; background: rgba(10, 10, 15, 0.95);
            border-top: 1px solid rgba(232, 64, 87, 0.2); display: flex; justify-content: space-between;
            align-items: center; padding: 0 25px; font-size: 12px;
        }
        #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
        .hud.listening #status-dot { background: var(--accent-crimson); box-shadow: 0 0 10px var(--accent-crimson); }
        .hud.thinking #status-dot { background: var(--accent-violet); box-shadow: 0 0 10px var(--accent-violet); }
        .hud.speaking #status-dot { background: var(--hud-cyan); box-shadow: 0 0 10px var(--hud-cyan); }

        /* Animations */
        @keyframes orbPulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
        @keyframes orbThink { 100% { transform: rotate(360deg); } }
        @keyframes orbSpeak { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
   
        /* --- TUFF MEME STATE --- */
@keyframes tuffPulse {
    0% { transform: scale(1); filter: brightness(1) saturate(1); box-shadow: 0 0 20px #ff4500; }
    50% { transform: scale(1.15); filter: brightness(1.5) saturate(2); box-shadow: 0 0 60px #ff8c00, 0 0 100px rgba(255, 69, 0, 0.4); }
    100% { transform: scale(1); filter: brightness(1) saturate(1); box-shadow: 0 0 20px #ff4500; }
}

.orb-wrapper.tuff .orb {
    border-color: #ff4500 !important;
    background: radial-gradient(circle, #4a1a00 0%, var(--bg-void) 100%) !important;
    animation: tuffPulse 0.4s infinite ease-in-out !important;
}

.orb-wrapper.tuff svg {
    fill: #ff8c00 !important;
}

.hud.tuff #status-dot {
    background: #ff4500;
    box-shadow: 0 0 15px #ff4500;
}
   </style>
</head>
<body>
    <div class="gradient-bg"></div><div class="fog-bg"></div><div class="noise-bg"></div>
    <div class="view-container">
        <header class="header"><h1>OMEN // ASSISTANT</h1><p>VOICE INTERFACE v1.0</p></header>
        <main class="center-stage">
            <div class="orb-wrapper idle" id="mic-wrapper" onclick="triggerMic()">
                <div class="orb-ring"></div>
                <div class="orb"><svg viewBox="0 0 24 24"><path d="M12,14c1.66,0,3-1.34,3-3V5c0-1.66-1.34-3-3-3S9,3.34,9,5v6C9,12.66,10.34,14,12,14z M17,11c0,2.76-2.24,5-5,5s-5-2.24-5-5H5 c0,3.53,2.61,6.43,6,6.92V21h2v-3.08c3.39-0.49,6-3.39,6-6.92H17z"/></svg></div>
            </div>
            <div class="waveform-container"><canvas id="waveform" width="800" height="80"></canvas></div>
        </main>
        <section class="transcript-wrapper"><div class="transcript-panel" id="transcript"></div></section>
        <footer class="hud" id="hud">
            <div class="hud-status"><div id="status-dot"></div><span id="status-label">IDLE</span></div>
            <div class="hud-logo">OMEN</div>
            <div class="hud-ping">RTT: <span id="rtt-val">--</span> ms</div>
        </footer>
    </div>

    <script type="text/javascript" src="/eel.js"></script>
    <script>
        const micWrapper = document.getElementById('mic-wrapper');
        const transcript = document.getElementById('transcript');
        const hud = document.getElementById('hud');
        const statusLabel = document.getElementById('status-label');
        const waveformCanvas = document.getElementById('waveform');
        const canvasCtx = waveformCanvas.getContext('2d');

        let currentAssistantState = 'idle';
        let animationFrameId = null;

        /* --- EXPOSED TO PYTHON --- */
        eel.expose(setAssistantState);
        function setAssistantState(state) {
            micWrapper.className = `orb-wrapper ${state}`;
            hud.className = `hud ${state}`;
            statusLabel.textContent = state.toUpperCase();
            currentAssistantState = state;
        }

        eel.expose(addMessage);
        function addMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${role}`;
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            msgDiv.innerHTML = `<span>${text}</span><span class="time">${time}</span>`;
            transcript.appendChild(msgDiv);
            transcript.scrollTop = transcript.scrollHeight;
        }


        /* --- EXPOSED TO PYTHON --- */
eel.expose(triggerTuffMode);
function triggerTuffMode(duration) {
    // Save previous state to restore it later
    const prevState = currentAssistantState;
    
    // Switch to Tuff visuals
    micWrapper.className = `orb-wrapper tuff`;
    hud.className = `hud tuff`;
    statusLabel.textContent = "TUFF MODE ACTIVE";
    statusLabel.style.color = "#ff4500";

    // Revert after duration
    setTimeout(() => {
        setAssistantState(prevState);
        statusLabel.style.color = ""; // Reset color
    }, duration);
}

        function triggerMic() {
            console.log("Orb Clicked!");
            eel.process_voice_input();
        }

        /* Waveform Placeholder */
        function drawWaveform() {
            animationFrameId = requestAnimationFrame(drawWaveform);
            const w = waveformCanvas.width, h = waveformCanvas.height;
            canvasCtx.clearRect(0, 0, w, h);
            canvasCtx.beginPath();
            canvasCtx.moveTo(0, h/2);
            canvasCtx.strokeStyle = '#6B6880';
            const t = Date.now() * 0.002;
            for(let x=0; x<w; x++) {
                const y = (h/2) + Math.sin(x * 0.02 + t) * (currentAssistantState === 'idle' ? 2 : 15);
                canvasCtx.lineTo(x, y);
            }
            canvasCtx.stroke();
        }
        drawWaveform();
    </script>
</body>
</html>
